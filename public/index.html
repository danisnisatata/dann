<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sub {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .box {
            background: rgba(0,0,0,0.3);
            border: 2px dashed #3b82f6;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .box.drag { background: rgba(59,130,246,0.1); border-color: #60a5fa; }
        .box p { color: #94a3b8; }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn:disabled { background: #4b5563; cursor: not-allowed; }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            margin-top: 12px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-family: monospace;
        }
        .api-card {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0;
        }
        .api-key {
            font-family: monospace;
            background: #0f0f0f;
            padding: 12px;
            border-radius: 12px;
            color: #10b981;
            word-break: break-all;
            font-size: 12px;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            display: none;
        }
        .result a { color: #3b82f6; text-decoration: none; word-break: break-all; }
        .error { color: #ef4444; }
        .success { color: #10b981; }
        .flex { display: flex; gap: 12px; }
        .copy-btn {
            background: #334155;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📸 Uploader</h1>
    <div class="sub">Upload gambar, dapet link permanen</div>
    
    <div id="apiSection">
        <div class="api-card">
            <div style="color:#94a3b8; margin-bottom: 8px;">🔑 API Key Kamu</div>
            <div id="apiKeyDisplay" class="api-key" style="cursor: pointer;" onclick="copyApiKey()">Belum punya API Key</div>
            <div class="flex" style="margin-top: 12px;">
                <button id="generateBtn" class="btn" style="margin:0;">✨ Generate Baru</button>
                <button id="checkBtn" class="btn btn-secondary" style="margin:0; background:#334155;">🔍 Cek</button>
            </div>
        </div>
    </div>
    
    <div class="box" id="dropzone">
        <p>📂 Drag & drop gambar disini</p>
        <p style="font-size:12px; margin-top:8px;">atau klik untuk pilih file</p>
    </div>
    <input type="file" id="fileInput" style="display:none;" accept="image/*">
    <button id="uploadBtn" class="btn" disabled>⬆ Upload</button>
    
    <div id="result" class="result"></div>
</div>

<script>
    let currentApiKey = localStorage.getItem('apiKey');
    let selectedFile = null;
    
    // DOM elements
    const apiKeyDisplay = document.getElementById('apiKeyDisplay');
    const generateBtn = document.getElementById('generateBtn');
    const checkBtn = document.getElementById('checkBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const resultDiv = document.getElementById('result');
    
    // Load API Key dari localStorage
    if (currentApiKey) {
        apiKeyDisplay.innerText = currentApiKey;
        uploadBtn.disabled = false;
        checkApiKey();
    }
    
    // Generate API Key
    generateBtn.onclick = async () => {
        resultDiv.style.display = 'none';
        try {
            const res = await fetch('/api/key', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                currentApiKey = data.apiKey;
                localStorage.setItem('apiKey', currentApiKey);
                apiKeyDisplay.innerText = currentApiKey;
                uploadBtn.disabled = false;
                showResult('✅ API Key berhasil dibuat!', 'success');
            } else {
                showResult('❌ Gagal: ' + data.error, 'error');
            }
        } catch (err) {
            showResult('❌ Error: ' + err.message, 'error');
        }
    };
    
    // Cek API Key
    async function checkApiKey() {
        if (!currentApiKey) return;
        try {
            const res = await fetch('/api/key', {
                headers: { 'X-API-Key': currentApiKey }
            });
            if (res.status === 200) {
                const data = await res.json();
                apiKeyDisplay.innerText = currentApiKey;
                uploadBtn.disabled = false;
            } else {
                localStorage.removeItem('apiKey');
                currentApiKey = null;
                apiKeyDisplay.innerText = '❌ API Key tidak valid, generate baru';
                uploadBtn.disabled = true;
            }
        } catch (err) {
            console.log(err);
        }
    }
    
    checkBtn.onclick = checkApiKey;
    
    // Copy API Key
    window.copyApiKey = () => {
        if (currentApiKey) {
            navigator.clipboard.writeText(currentApiKey);
            showResult('📋 API Key disalin!', 'success');
            setTimeout(() => resultDiv.style.display = 'none', 2000);
        }
    };
    
    // Dropzone
    dropzone.onclick = () => fileInput.click();
    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('drag'); };
    dropzone.ondragleave = () => dropzone.classList.remove('drag');
    dropzone.ondrop = (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag');
        if (e.dataTransfer.files.length) {
            selectedFile = e.dataTransfer.files[0];
            fileInput.files = e.dataTransfer.files;
            showResult(`📁 ${selectedFile.name} siap upload`, 'success');
        }
    };
    fileInput.onchange = (e) => {
        if (e.target.files.length) {
            selectedFile = e.target.files[0];
            showResult(`📁 ${selectedFile.name} siap upload`, 'success');
        }
    };
    
    // Upload
    uploadBtn.onclick = async () => {
        if (!currentApiKey) return showResult('🔑 Belum punya API Key, generate dulu!', 'error');
        if (!selectedFile) return showResult('📂 Pilih gambar dulu!', 'error');
        
        uploadBtn.disabled = true;
        uploadBtn.innerText = '⏳ Uploading...';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<span>⏳ Mengirim...</span>';
        
        const formData = new FormData();
        formData.append('file', selectedFile);
        
        try {
            const res = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'X-API-Key': currentApiKey },
                body: formData
            });
            const data = await res.json();
            
            if (data.success) {
                resultDiv.innerHTML = `
                    <div class="success">✅ Upload berhasil!</div>
                    <div style="margin-top:12px;"><strong>🔗 Link:</strong><br>
                    <a href="${data.url}" target="_blank">${data.url}</a></div>
                    <div style="margin-top:8px; font-size:12px; color:#666;">📊 Total upload: ${data.usage}</div>
                `;
                selectedFile = null;
                fileInput.value = '';
            } else {
                resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="error">⚠️ Error: ${err.message}</div>`;
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.innerText = '⬆ Upload';
        }
    };
    
    function showResult(msg, type) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<div class="${type}">${msg}</div>`;
        setTimeout(() => {
            if (resultDiv.innerHTML === `<div class="${type}">${msg}</div>`) {
                resultDiv.style.display = 'none';
            }
        }, 3000);
    }
</script>
</body>
</html>
